jobs:
  - job: PythonQuality
    displayName: Python tests
    pool:
      name: mlops-agent-pool

    steps:
      - checkout: self

      - script: |
          set -e
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .[dev]
          pytest -q
        displayName: Install and test