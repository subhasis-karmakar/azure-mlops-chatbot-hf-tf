parameters:
  environmentName: dev

jobs:
  - job: TerraformValidatePlan
    displayName: Terraform Validate and Plan
    pool:
      name: mlops-agent-pool

    steps:
      - checkout: self

      - script: |
          set -e
          terraform version
        displayName: Check Terraform version

      - script: |
          set -e
          cd infra
          terraform init
          terraform validate
          terraform plan -out=tfplan -var-file=environments/${{ parameters.environmentName }}.tfvars
        displayName: Terraform init, validate, plan
        env:
          ARM_CLIENT_ID: $(ARM_CLIENT_ID)
          ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
          ARM_TENANT_ID: $(ARM_TENANT_ID)
          ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: infra/tfplan
          artifact: tfplan-${{ parameters.environmentName }}
          publishLocation: pipeline
        displayName: Publish Terraform plan