parameters:
  environmentName: dev

jobs:
  - job: DeployAKS
    displayName: Deploy inference service to AKS
    pool:
      name: mlops-agent-pool

    steps:
      - checkout: self

      - task: DownloadPipelineArtifact@2
        inputs:
          artifact: inference-image
          path: .
        displayName: Download image metadata

      - script: |
          set -e
          IMAGE_NAME=$(cat image_name.txt)
          echo "Using image: ${IMAGE_NAME}"
          echo "##vso[task.setvariable variable=IMAGE_NAME]${IMAGE_NAME}"
        displayName: Read image metadata

      - script: |
          set -e
          az login --service-principal \
            --username "$(ARM_CLIENT_ID)" \
            --password "$(ARM_CLIENT_SECRET)" \
            --tenant "$(ARM_TENANT_ID)"

          az account set --subscription "$(ARM_SUBSCRIPTION_ID)"
          az aks get-credentials \
            --resource-group "$(RESOURCE_GROUP)" \
            --name "$(AKS_NAME)" \
            --overwrite-existing
        displayName: Login and get AKS credentials

      - script: |
          set -e
          kubectl create namespace chatbot-dev --dry-run=client -o yaml | kubectl apply -f -

          sed "s|__IMAGE__|$(IMAGE_NAME)|g" deployment/aks/deployment.yml | kubectl apply -n chatbot-dev -f -
          kubectl apply -n chatbot-dev -f deployment/aks/service.yml
          kubectl apply -n chatbot-dev -f deployment/aks/configmap.yml

          if [ -f deployment/aks/hpa.yml ]; then
            kubectl apply -n chatbot-dev -f deployment/aks/hpa.yml
          fi

          if [ -f deployment/aks/ingress.yml ]; then
            kubectl apply -n chatbot-dev -f deployment/aks/ingress.yml
          fi
        displayName: Deploy manifests

      - script: |
          set -e
          kubectl rollout status deployment/chatbot-inference -n chatbot-dev --timeout=300s
        displayName: Wait for rollout

      - template: smoke-test.yml
        parameters:
          namespace: chatbot-dev