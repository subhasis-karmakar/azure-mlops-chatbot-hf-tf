apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-api
  namespace: chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot-api
  template:
    metadata:
      labels:
        app: chatbot-api
    spec:
      containers:
        - name: chatbot-api
          image: REPLACE_ACR_LOGIN_SERVER/chatbot-inference:latest
          ports:
            - containerPort: 8000
          env:
            - name: CHATBOT_CONFIG_PATH
              value: "configs/train_config.yaml"
            - name: CHATBOT_MODEL_DIR
              value: "artifacts/model"
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
