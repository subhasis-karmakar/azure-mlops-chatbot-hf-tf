apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: chatbot-kv-secrets
  namespace: chatbot
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: "REPLACE_KEY_VAULT_NAME"
    objects: |
      array:
        - |
          objectName: chatbot-secret
          objectType: secret
    tenantId: "REPLACE_TENANT_ID"
